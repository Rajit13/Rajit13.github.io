<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Request</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f3e5f5; text-align: center; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        button { cursor: pointer; border: 1px solid #ddd; padding: 10px; border-radius: 10px; margin: 5px; background: white; transition: 0.3s; }
        button:hover { background: #fce4ec; }
        .yes-btn { background: #e91e63; color: white; border: none; width: 80%; font-size: 1.2rem; }
        .hidden { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- Step 1: Initial Ask -->
    <div id="step1" class="card">
        <h1>🌸 Will you go on a date with me, Jarin? 🌸</h1>
        <button class="yes-btn" onclick="nextStep(2)">YES ♥</button>
        <button onclick="alert('Oh no! Try again?')">NO 🥺</button>
    </div>

    <!-- Step 2: Date/Time -->
    <div id="step2" class="card hidden">
        <h2>So... when are you free? 📅</h2>
        <input type="date" id="datePicker" style="width: 90%; padding: 10px;">
        <div class="grid">
            <button onclick="saveDateTime('4:00 PM')">4:00 PM</button>
            <button onclick="saveDateTime('5:00 PM')">5:00 PM</button>
            <button onclick="saveDateTime('6:00 PM')">6:00 PM</button>
            <button onclick="saveDateTime('7:00 PM')">7:00 PM</button>
        </div>
    </div>

    <!-- Step 3: Food Selection -->
    <div id="step3" class="card hidden">
        <h2>What are we feeling? 🍽️✨</h2>
        <div class="grid">
            <button onclick="finish('Biriyani')">🥘 Biriyani</button>
            <button onclick="finish('Coffee')">☕ Coffee</button>
            <button onclick="finish('Kabab')">🍢 Kabab</button>
            <button onclick="finish('Burger')">🍔 Burger</button>
        </div>
    </div>

    <!-- Step 4: Final Confirmation -->
    <div id="step4" class="card hidden">
        <h1>YAY!! 💕</h1>
        <p id="finalDetails"></p>
        <p>I can't wait to see you! 🌷✨</p>
    </div>

    <script>
        let data = { date: "", time: "", food: "" };

        function nextStep(step) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById('step' + step).classList.remove('hidden');
        }

        function saveDateTime(time) {
            data.date = document.getElementById('datePicker').value;
            data.time = time;
            if(!data.date) { alert("Please pick a date first!"); return; }
            nextStep(3);
        }

        function finish(food) {
            data.food = food;
            document.getElementById('finalDetails').innerText = 
                `Date: ${data.date} at ${data.time}\nFood: ${data.food}`;
            nextStep(4);
        }
    </script>
</body>
</html>
